# ─────────────────────────────────────────────────────────────────────────────
# PEOPLE — key contacts for the network
# ─────────────────────────────────────────────────────────────────────────────
# Each entry supports the following fields:
#
#   name        (required) Full name
#   role        (required) e.g. "Associate Professor", "PhD Researcher"
#   affiliation (required) University or institute
#   email       (optional) Displayed as a mailto link
#   website     (optional) Personal or lab website URL
#   photo       (optional) Path relative to /static/, e.g. "images/people/jane.jpg"
#                          If omitted, a placeholder initial avatar is shown.
#   bio         (optional) One or two sentences shown beneath the card
#
# To ADD a person: copy one block, paste it at the end, and fill in the fields.
# To REMOVE a person: delete the entire block (from "- name:" to the next one).
# To ADD a photo: place the file in static/images/people/ and set the photo field.
# ─────────────────────────────────────────────────────────────────────────────

